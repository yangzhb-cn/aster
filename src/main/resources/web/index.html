<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aster Web</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 6l7.7 17.4L58 25.5 44.3 38.2 48.4 57 32 47.3 15.6 57l4.1-18.8L6 25.5l18.3-2.1z' fill='%230d9488'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23fffdf8'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Aster</span>
          <nav class="view-tabs" aria-label="视图切换">
            <button id="chatViewButton" class="view-tab active" type="button">Chat</button>
            <button id="roomViewButton" class="view-tab" type="button">Room</button>
            <button id="archiveViewButton" class="view-tab" type="button">Archive</button>
          </nav>
        </div>
        <div class="run-strip">
          <span id="connectionState" class="state-pill">connecting</span>
          <select id="modelSelect" class="model-select" aria-label="切换 Chat 模型">
            <option>model</option>
          </select>
        </div>
        <div class="top-actions">
          <button id="stopButton" class="ghost-button danger" type="button">Stop</button>
        </div>
      </header>

      <aside class="left-rail">
        <section id="chatLeftPanel" class="rail-section sessions-section">
          <div class="session-head">
            <span class="eyebrow">SESSIONS</span>
            <button id="newSessionButton" class="icon-button" type="button" title="新建会话" aria-label="新建会话">+</button>
          </div>
          <div id="sessionList" class="session-list"></div>
          <div class="capability-dock">
            <div id="mcpCapabilityPanel" class="capability-panel hidden">
              <div class="capability-title">MCP</div>
              <div id="mcpServerList" class="mcp-list"></div>
            </div>
            <div id="skillCapabilityPanel" class="capability-panel hidden">
              <div class="capability-title">SKILL</div>
              <div id="skillList" class="mcp-list"></div>
            </div>
            <div class="capability-actions">
              <button id="toggleMcpButton" class="capability-toggle" type="button" title="MCP 状态" aria-label="MCP 状态">MCP</button>
              <button id="toggleSkillButton" class="capability-toggle" type="button" title="Skill 列表" aria-label="Skill 列表">SKILL</button>
            </div>
          </div>
        </section>
        <section id="roomLeftPanel" class="rail-section room-panel hidden">
          <div class="session-head">
            <span class="eyebrow">ROOMS</span>
            <button id="newRoomButton" class="icon-button" type="button" title="新建聊天室" aria-label="新建聊天室">+</button>
          </div>
          <div id="roomList" class="session-list"></div>
          <div class="session-head">
            <span class="eyebrow">AGENTS</span>
            <button id="newRoomAgentButton" class="icon-button" type="button" title="新增 Agent" aria-label="新增 Agent">+</button>
          </div>
          <div id="roomAgentList" class="session-list"></div>
        </section>
      </aside>

      <main class="chat-pane">
        <section class="chat-surface">
          <div id="messages" class="messages" aria-live="polite"></div>
        </section>

        <form id="composer" class="composer">
          <label class="sr-only" for="prompt">输入消息</label>
          <textarea id="prompt" rows="1" placeholder="输入任务或问题"></textarea>
          <div class="composer-bar">
            <div class="composer-actions">
              <button id="sendButton" type="submit">发送</button>
            </div>
          </div>
        </form>
      </main>

      <aside class="right-rail">
        <div id="chatRightPanel">
          <section class="rail-section">
            <span class="eyebrow">TOKENS</span>
            <div class="token-grid">
              <div class="token-row">
                <span>input</span>
                <strong id="inputTokens">-</strong>
              </div>
              <div class="token-row">
                <span>cache</span>
                <strong id="cacheTokens">-</strong>
              </div>
              <div class="token-row">
                <span>miss</span>
                <strong id="missTokens">-</strong>
              </div>
              <div class="token-row">
                <span>output</span>
                <strong id="outputTokens">-</strong>
              </div>
              <div class="token-row strong">
                <span>total</span>
                <strong id="totalTokens">-</strong>
              </div>
            </div>
          </section>
          <section class="rail-section">
            <span class="eyebrow">CONTEXT</span>
            <div class="context-meter">
              <div class="context-meter-main">
                <strong id="contextUsedPercent">-</strong>
                <span>已用</span>
              </div>
              <div class="context-meter-sub">
                已用 <strong id="contextUsedTokens">-</strong> 标记，共 <strong id="contextTotalTokens">-</strong>
              </div>
            </div>
          </section>
          <section class="rail-section approval-control-section">
            <span class="eyebrow">APPROVAL</span>
            <div class="approval-mode-switch" role="group" aria-label="工具审批模式">
              <button id="approvalManualButton" class="approval-mode-button active" type="button">需要审批</button>
              <button id="approvalAutoButton" class="approval-mode-button" type="button">默认通过</button>
            </div>
          </section>
          <section class="rail-section todo-section">
            <div class="todo-head">
              <span class="eyebrow">TODO</span>
              <div class="rail-head-actions">
                <button id="newTodoButton" class="icon-button" type="button" title="新建待办" aria-label="新建待办" aria-expanded="false">+</button>
                <button id="refreshTodosButton" class="icon-button" type="button" title="刷新待办" aria-label="刷新待办">↻</button>
              </div>
            </div>
            <form id="todoForm" class="todo-form hidden">
              <label class="sr-only" for="todoContent">待办内容</label>
              <textarea id="todoContent" rows="3" placeholder="写一个代办"></textarea>
              <label class="sr-only" for="todoDueAt">到期时间</label>
              <input id="todoDueAt" type="datetime-local" />
              <button id="addTodoButton" type="submit">添加</button>
            </form>
            <div id="todoList" class="todo-list"></div>
          </section>
          <section class="rail-section schedule-section">
            <div class="todo-head">
              <span class="eyebrow">SCHEDULE</span>
              <div class="rail-head-actions">
                <button id="newScheduleButton" class="icon-button" type="button" title="新建定时任务" aria-label="新建定时任务" aria-expanded="false">+</button>
                <button id="refreshSchedulesButton" class="icon-button" type="button" title="刷新定时任务" aria-label="刷新定时任务">↻</button>
              </div>
            </div>
            <form id="scheduleForm" class="schedule-form hidden">
              <label class="sr-only" for="scheduleName">任务名称</label>
              <input id="scheduleName" type="text" placeholder="每日整理长期记忆" />
              <label class="sr-only" for="scheduleContent">触发后发送给 Agent 的消息</label>
              <textarea id="scheduleContent" rows="4" placeholder="请整理长期记忆，抽取最近对话里的稳定偏好、项目规则和踩坑经验。"></textarea>
              <label class="sr-only" for="scheduleType">触发方式</label>
              <select id="scheduleType">
                <option value="daily">每日</option>
                <option value="once">一次性</option>
                <option value="interval">固定间隔</option>
              </select>
              <div id="scheduleDailyFields" class="schedule-fields">
                <label class="sr-only" for="scheduleDailyTime">每日时间</label>
                <input id="scheduleDailyTime" type="time" value="09:00" />
                <label class="sr-only" for="scheduleTimezone">时区</label>
                <input id="scheduleTimezone" type="text" placeholder="Asia/Shanghai" />
              </div>
              <div id="scheduleOnceFields" class="schedule-fields hidden">
                <label class="sr-only" for="scheduleRunAt">执行时间</label>
                <input id="scheduleRunAt" type="datetime-local" />
              </div>
              <div id="scheduleIntervalFields" class="schedule-fields hidden">
                <label class="sr-only" for="scheduleIntervalSeconds">间隔秒数</label>
                <input id="scheduleIntervalSeconds" type="number" min="1" step="1" placeholder="间隔秒数，如 3600" />
              </div>
              <button id="addScheduleButton" type="submit">添加定时任务</button>
            </form>
            <div id="scheduleList" class="schedule-list"></div>
          </section>
        </div>
        <div id="roomRightPanel" class="hidden">
          <details id="roomMembersDetails" class="rail-section collapsible-section room-members-section" open>
            <summary class="collapsible-head">
              <span class="eyebrow">MEMBERS</span>
            </summary>
            <div class="collapsible-body">
              <div class="room-section-toolbar">
                <button id="refreshRoomMembersButton" class="soft-button" type="button">刷新成员</button>
              </div>
              <div id="roomMemberList" class="member-list"></div>
            </div>
          </details>
          <details id="roomJoinDetails" class="rail-section collapsible-section room-join-section">
            <summary class="collapsible-head">
              <span class="eyebrow">JOIN</span>
            </summary>
            <div class="collapsible-body">
              <label class="member-add">
                <span>加入 Agent</span>
                <select id="roomMemberSelect"></select>
              </label>
              <button id="addRoomMemberButton" class="primary-action" type="button">加入聊天室</button>
            </div>
          </details>
          <details id="roomEditorDetails" class="rail-section collapsible-section room-editor-section">
            <summary class="collapsible-head">
              <span class="eyebrow">AGENT 设置</span>
            </summary>
            <div class="collapsible-body">
              <form id="roomAgentForm" class="room-agent-form">
                <input id="roomAgentId" type="hidden" />
                <label>
                  <span>名称</span>
                  <input id="roomAgentName" type="text" placeholder="例如：产品经理" />
                </label>
                <label>
                  <span>角色</span>
                  <input id="roomAgentRole" type="text" placeholder="一句话描述角色" />
                </label>
                <label>
                  <span>模型</span>
                  <select id="roomAgentModel"></select>
                </label>
                <label>
                  <span>别名</span>
                  <input id="roomAgentAliases" type="text" placeholder="逗号分隔，如 pm,产品" />
                </label>
                <label>
                  <span>工具</span>
                  <input id="roomAgentTools" type="text" placeholder="read,ls,glob,grep,web_fetch,web_search" />
                </label>
                <label>
                  <span>描述</span>
                  <textarea id="roomAgentDescription" rows="3" placeholder="展示给用户和 Agent 自己看的描述"></textarea>
                </label>
                <label>
                  <span>系统提示词</span>
                  <textarea id="roomAgentPrompt" rows="10" placeholder="这个 Agent 的专属 system prompt"></textarea>
                </label>
                <label class="room-agent-enabled">
                  <input id="roomAgentEnabled" type="checkbox" checked />
                  <span>启用</span>
                </label>
                <div class="room-agent-actions">
                  <button id="saveRoomAgentButton" class="primary-action" type="submit">保存</button>
                  <button id="archiveRoomAgentButton" class="danger-action" type="button">归档</button>
                </div>
              </form>
            </div>
          </details>
        </div>
      </aside>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
