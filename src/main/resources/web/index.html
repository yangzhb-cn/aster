<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aster Web</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 6l7.7 17.4L58 25.5 44.3 38.2 48.4 57 32 47.3 15.6 57l4.1-18.8L6 25.5l18.3-2.1z' fill='%230d9488'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23fffdf8'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/assets/app.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Aster</span>
          <nav class="view-tabs" aria-label="视图切换">
            <button id="chatViewButton" class="view-tab active" type="button">Chat</button>
            <button id="roomViewButton" class="view-tab" type="button">Room</button>
            <button id="archiveViewButton" class="view-tab" type="button">Archive</button>
          </nav>
        </div>
        <div class="run-strip">
          <span id="connectionState" class="state-pill">connecting</span>
          <span id="modelName">model</span>
          <span id="sessionName">session</span>
        </div>
        <div class="top-actions">
          <button id="stopButton" class="ghost-button danger" type="button">Stop</button>
        </div>
      </header>

      <aside class="left-rail">
        <section id="chatLeftPanel" class="rail-section sessions-section">
          <div class="session-head">
            <span class="eyebrow">SESSIONS</span>
            <button id="newSessionButton" class="icon-button" type="button" title="新建会话" aria-label="新建会话">+</button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>
        <section id="roomLeftPanel" class="rail-section room-panel hidden">
          <div class="session-head">
            <span class="eyebrow">ROOMS</span>
            <button id="newRoomButton" class="icon-button" type="button" title="新建聊天室" aria-label="新建聊天室">+</button>
          </div>
          <div id="roomList" class="session-list"></div>
          <div class="session-head">
            <span class="eyebrow">AGENTS</span>
            <button id="newRoomAgentButton" class="icon-button" type="button" title="新增 Agent" aria-label="新增 Agent">+</button>
          </div>
          <div id="roomAgentList" class="session-list"></div>
        </section>
      </aside>

      <main class="chat-pane">
        <section class="chat-surface">
          <div id="messages" class="messages" aria-live="polite"></div>
        </section>

        <form id="composer" class="composer">
          <label class="sr-only" for="prompt">输入消息</label>
          <textarea id="prompt" rows="1" placeholder="输入任务或问题"></textarea>
          <button id="sendButton" type="submit">发送</button>
        </form>
      </main>

      <aside class="right-rail">
        <div id="chatRightPanel">
          <section class="rail-section">
            <span class="eyebrow">TOKENS</span>
            <div class="token-grid">
              <div class="token-row">
                <span>input</span>
                <strong id="inputTokens">-</strong>
              </div>
              <div class="token-row">
                <span>cache</span>
                <strong id="cacheTokens">-</strong>
              </div>
              <div class="token-row">
                <span>miss</span>
                <strong id="missTokens">-</strong>
              </div>
              <div class="token-row">
                <span>output</span>
                <strong id="outputTokens">-</strong>
              </div>
              <div class="token-row strong">
                <span>total</span>
                <strong id="totalTokens">-</strong>
              </div>
            </div>
          </section>
          <section class="rail-section">
            <span class="eyebrow">CONTEXT</span>
            <div class="token-grid">
              <div class="token-row">
                <span>before</span>
                <strong id="contextBefore">-</strong>
              </div>
              <div class="token-row">
                <span>after</span>
                <strong id="contextAfter">-</strong>
              </div>
              <div class="token-row">
                <span>max</span>
                <strong id="contextMax">-</strong>
              </div>
              <div class="token-row strong">
                <span>compressed</span>
                <strong id="contextCompressed">-</strong>
              </div>
            </div>
          </section>
          <section class="rail-section todo-section">
            <div class="todo-head">
              <span class="eyebrow">TODO</span>
              <button id="refreshTodosButton" class="icon-button" type="button" title="刷新待办" aria-label="刷新待办">R</button>
            </div>
            <form id="todoForm" class="todo-form">
              <label class="sr-only" for="todoContent">待办内容</label>
              <textarea id="todoContent" rows="3" placeholder="写一个代办"></textarea>
              <label class="sr-only" for="todoDueAt">到期时间</label>
              <input id="todoDueAt" type="datetime-local" />
              <button id="addTodoButton" type="submit">添加</button>
            </form>
            <div id="todoList" class="todo-list"></div>
          </section>
        </div>
        <div id="roomRightPanel" class="hidden">
          <section class="rail-section room-editor-section">
            <span class="eyebrow">AGENT</span>
            <form id="roomAgentForm" class="room-agent-form">
              <input id="roomAgentId" type="hidden" />
              <label>
                <span>名称</span>
                <input id="roomAgentName" type="text" placeholder="例如：产品经理" />
              </label>
              <label>
                <span>角色</span>
                <input id="roomAgentRole" type="text" placeholder="一句话描述角色" />
              </label>
              <label>
                <span>别名</span>
                <input id="roomAgentAliases" type="text" placeholder="逗号分隔，如 pm,产品" />
              </label>
              <label>
                <span>工具</span>
                <input id="roomAgentTools" type="text" placeholder="read,ls,glob,grep,web_fetch,web_search" />
              </label>
              <label>
                <span>描述</span>
                <textarea id="roomAgentDescription" rows="3" placeholder="展示给用户和 Agent 自己看的描述"></textarea>
              </label>
              <label>
                <span>系统提示词</span>
                <textarea id="roomAgentPrompt" rows="10" placeholder="这个 Agent 的专属 system prompt"></textarea>
              </label>
              <label class="room-agent-enabled">
                <input id="roomAgentEnabled" type="checkbox" checked />
                <span>启用</span>
              </label>
              <div class="room-agent-actions">
                <button id="saveRoomAgentButton" type="submit">保存</button>
                <button id="archiveRoomAgentButton" class="ghost-button danger" type="button">归档</button>
              </div>
            </form>
          </section>
        </div>
      </aside>
    </div>

    <script src="/assets/app.js"></script>
  </body>
</html>
